name: Validate Skills

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y jq shellcheck

      - name: Validate catalog
        run: ./scripts/validate.sh

      # Fast per-PR subset (F000081 follow-up): TEST_FAST=1 skips the heavy
      # skills-deploy fixture suite (test-deploy.sh) — re-layered to CI-nightly
      # (.github/workflows/nightly.yml runs the FULL suite every night). Every fast
      # unit sub-suite + the inline integration tests + validate.sh still gate per-PR.
      - name: Run tests (fast subset — heavy test-deploy runs nightly)
        run: TEST_FAST=1 ./scripts/test.sh

      - name: Lint shell scripts
        run: shellcheck scripts/*.sh scripts/skills-deploy scripts/skills-update-check
