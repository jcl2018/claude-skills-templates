name: Windows (Git Bash)

# Windows support is POSIX-via-Git-Bash (F000044). This job is the live signal
# that the support holds: it runs on windows-latest under Git Bash (the shell
# Claude Code itself uses to run skill preambles on Windows) and GATES the PR,
# so a change that breaks Windows fails before merge (S000080 AC-2).
#
# This is the FAST per-PR Windows signal — the `CI-push` cadence category
# (F000075 / S000125). It runs ONLY the quick smoke:
#   - scripts/windows-smoke.sh  — CRLF + portable-date + copy-mode install (the
#                                 three F000044 stories, one assertion block each)
#
# The slow full skills-deploy suite (scripts/test-deploy.sh on windows-latest) was
# moved OFF the PR path to the nightly workflow — the `CI-nightly` cadence category
# `windows-deploy` test in .github/workflows/windows-nightly.yml. PRs stop paying
# for the slow deploy suite; native-Windows test-deploy regressions surface nightly
# (per-PR POSIX coverage of test-deploy.sh via test.sh on ubuntu is unchanged).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-smoke:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash        # Git Bash, built into the windows-latest runner image
    steps:
      - uses: actions/checkout@v4

      - name: Tool versions (Git Bash)
        run: |
          uname -s
          bash --version | head -1
          git --version
          jq --version

      - name: Windows smoke (CRLF + portable date + copy-mode install)
        run: bash scripts/windows-smoke.sh
